name: Build All Platforms
on:
  push:
    branches: [main]
  repository_dispatch:
    types: [build-trigger]

jobs:
  build-webapp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Debug - List Files
        run: ls -R
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build || true
      - name: Upload WebApp Build
        uses: actions/upload-artifact@v4
        with:
          name: webapp-build
          path: build/
        continue-on-error: true

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Debug - List Files
        run: ls -R
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Fix Kotlin version compatibility
        run: |
          mkdir -p android
          echo "kotlinVersion=1.9.25" >> android/gradle.properties
          echo "suppressKotlinVersionCompatibilityCheck=true" >> android/gradle.properties
      - run: npm install
      - run: npx expo build:android --type apk --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        continue-on-error: true

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Debug - List Files
        run: ls -R
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm install
      - run: npx expo build:ios --type simulator --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        continue-on-error: true
